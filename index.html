<!DOCTYPE html>
<html>
<head>
  <meta charset = "UTF-8" >
  <title>My Calculator</title>
</head>
<body>
  <style>
    body {
      background: #333;
      color: white;
    }

  .operator {
  background: orange;
}

    #display {
      width: 200px;
      height: 30px;
      font-size: 20px;
      text-align:right;
      margin-bottom: 00px;
    }
  
  
    button {
    width: 50px;
    height: 50px;
    font-size: 18px;
    margin: 5px;
    border-radius: 50%;
  }    

  .history-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width:260px;
    margin-top: 10px;
  }

  .history-header button {
    width: auto;
    height: 32px;
    padding: 6px 2px;
    font-size: 14px;
  }

  </style>

  
  <input type="text" id="display">
    
  <br><br>



  <br>
  <button class = 'operator' onclick="addNumber('1')">1</button> 
  <button class = 'operator' onclick="addNumber('2')">2</button> 
  <button class = 'operator' onclick="addNumber('3')">3</button> 
  <button class = 'operator' onclick="addNumber('/')">/</button>
  <button class = 'operator' onclick="addSymbol('sin(')">Sin</button>
  <button class = 'operator' onclick="addSymbol('cot(')">Cot</button>
  <br>

  <br>


  <button class = 'operator' onclick="addNumber('4')">4</button>
  <button class = 'operator' onclick="addNumber('5')">5</button>
  <button class = 'operator' onclick="addNumber('6')">6</button>
  <button class = 'operator' onclick="addNumber('*')">x</button>
   <button class = 'operator' onclick="addSymbol('cos(')">cos</button>
   <button class = 'operator' onclick="addSymbol('tan(')">tan</button>
  <br>
  
  <button class = 'operator' onclick="addNumber('7')">7</button>
  <button class = 'operator' onclick="addNumber('8')">8</button>
  <button class = 'operator' onclick="addNumber('9')">9</button>
  <button class = 'operator' onclick="addNumber('-')">-</button>
  <button class = 'operator' onclick="addSymbol('√')">√</button>
  <button class = 'operator' onclick="addNumber('^')">^</button>
  <br>

  <button onclick="clearDisplay()">C</button>
  <button class = 'operator' onclick="addNumber('0')">0</button>
  <button class = 'operator' onclick="addDecimal()">.</button>
  <button class = 'operator' onclick="addNumber('+')">+</button>
  <button onclick="calculate()">=</button>
  <button onclick="backspace()">⌫</button>
  <br><br>

  <div class="history-header">
    <h1 style="margin:0;">History</h1>
    <button id="clear-history" onclick="ClearHistory()">clear</button>
  </div>
  <ul id ="history"></ul>



  <script>
    // load history on the start
    window.onload = function() {
  let stored = JSON.parse(localStorage.getItem("history")) || [];
  let history = document.getElementById("history");

      // was a nightmare creating this 
  stored.forEach(function(item) {
    let li = document.createElement("li");

    li.innerText = item;
    history.appendChild(li);
  });
    };

    // make the 

    function addNumber(num) {
      document.getElementById("display").value += num;
    }

    function clearDisplay() {
      document.getElementById("display").value = "";
    }

    function calculate() {
      let display = document.getElementById("display");
      try {  
        // doing this so i can get acess to this again in hitory
        let expression = display.value;
        let oldExpression = display.value;
        // I.accept the one line below this, mainly the pattern is what i got from chatgpt, i undersand javas script but can't do this stuff yet. and the lines below took inspiration.
        // so bascially line 136-141 is Ai written
        expression = expression.replace(/√(\d+(\.\d+)?)/g, "Math.sqrt($1)");
        expression = expression.replace(/sin\((\d+(\.\d+)?)\)?/g, "Math.sin($1)");
        expression = expression.replace(/cos\((\d+(\.\d+)?)\)?/g, "Math.cos($1)");
        expression = expression.replace(/tan\((\d+(\.\d+)?)\)?/g, "Math.tan($1)");
        expression = expression.replace(/cot\((\d+(\.\d+)?)\)?/g, "1 / Math.tan($1)");
        expression = expression.replace(/\^/g, "**");
        let result = eval(expression)
        
        display.value = result;

        // use the expressions and result variable for history purposes
        addToHistory(oldExpression + " = "+ result)

      } catch {display.value = 'Error'}
    }

    function backspace() {
      let display = document.getElementById("display");

      display.value = display.value.slice(0,-1)
    }

    function addDecimal() {
      let display = document.getElementById("display");
      let parts = display.value.split(/[\+\-\*\/]/);
      let lastNumber = parts[parts.length-1];
      // still doubtful what would happen if I do this -> 3.3.2
      if (!lastNumber.includes(".")) {
        display.value += ".";
      }
    }

    function addToHistory(equation) {
      let history = document.getElementById("history")

      let li = document.createElement("li");
      li.innerText = equation;
      
      history.appendChild(li);

      let stored = JSON.parse(localStorage.getItem("history")) || [];
      stored.push(equation);
      localStorage.setItem("history", JSON.stringify(stored));

    }

    function addSymbol(symbol) {
      a = document.getElementById('display')
      a.value +=  symbol
    }

    document.addEventListener("keydown", function(event) {
      let key = event.key;

      if (!isNaN(key)) {
         addNumber(key);
      }

      else if (key === "-" || key === "+" || key === "*" || key === "/" || key === "^") {
          addNumber(key);
      }

      else if (key === ".") {
        
        addDecimal();
      }

      else if (key === "Enter") { calculate();}

      else if (key === "Backspace") {
        backspace();}

      else if (key === "Escape") {
        clearDisplay();}
    });

    function ClearHistory() {
      let history = document.getElementById("history");

      history.innerHTML = "";
      localStorage.removeItem("history");
    }
  
    </script>


</body>
</html>
