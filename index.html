<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="calculator" aria-label="Calculator">
    <section class="display-panel">
      <p class="label">Smart Calculator</p>
      <input id="display" type="text" value="0" aria-label="Calculator display" readonly>
    </section>

    <section class="keys" aria-label="Calculator keys">
      <button class="tool" type="button" data-action="clear">C</button>
      <button class="tool" type="button" data-action="backspace">⌫</button>
      <button class="tool" type="button" data-action="percent">%</button>
      <button class="operator" type="button" data-value="/">÷</button>

      <button type="button" data-value="7">7</button>
      <button type="button" data-value="8">8</button>
      <button type="button" data-value="9">9</button>
      <button class="operator" type="button" data-value="*">×</button>

      <button type="button" data-value="4">4</button>
      <button type="button" data-value="5">5</button>
      <button type="button" data-value="6">6</button>
      <button class="operator" type="button" data-value="-">−</button>

      <button type="button" data-value="1">1</button>
      <button type="button" data-value="2">2</button>
      <button type="button" data-value="3">3</button>
      <button class="operator" type="button" data-value="+">+</button>

      <button class="tool" type="button" data-action="toggle-sign">±</button>
      <button type="button" data-value="0">0</button>
      <button type="button" data-value=".">.</button>
      <button class="equals" type="button" data-action="calculate">=</button>
    </section>

    <section class="history-panel">
      <div class="history-heading">
        <h2>Recent</h2>
        <button type="button" data-action="clear-history">Clear</button>
      </div>
      <ul id="history" aria-live="polite"></ul>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
